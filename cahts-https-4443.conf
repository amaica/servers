server {
    listen 4443 ssl http2;
    listen [::]:4443 ssl http2;
    server_name app.agrowsynccrm.com.br 209.50.229.247;

    ssl_certificate     /etc/letsencrypt/live/app.agrowsynccrm.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.agrowsynccrm.com.br/privkey.pem;

    client_max_body_size 50m;

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
        proxy_pass http://127.0.0.1:3001;
    }
}
